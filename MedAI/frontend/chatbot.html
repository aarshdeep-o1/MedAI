<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAI - AI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo">M</div>
        <span class="nav-title">Medi<span>AI</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Register
        </a>
        <a href="queue.html" class="nav-link">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          Queue Status
        </a>
        <a href="admin.html" class="nav-link">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Admin
        </a>
        <a href="chatbot.html" class="nav-link active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          AI Assistant
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-container">
    <div class="chat-container">
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="chat-avatar">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 8V4H8"></path>
            <rect x="8" y="8" width="8" height="12" rx="1"></rect>
            <path d="M10 12h4"></path>
            <path d="M10 16h4"></path>
          </svg>
        </div>
        <div class="chat-info">
          <h3>MediAI Assistant</h3>
          <div class="chat-status">
            <span class="status-dot"></span>
            <span>Online - Ready to help</span>
          </div>
        </div>
      </div>

      <!-- Chat Messages -->
      <div class="chat-messages" id="chatMessages">
        <!-- Bot Welcome Message -->
        <div class="message bot">
          <div class="message-avatar">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 8V4H8"></path>
              <rect x="8" y="8" width="8" height="12" rx="1"></rect>
            </svg>
          </div>
          <div class="message-content">
            Hello! I'm MediAI, your healthcare assistant. I can help you with:
            <ul style="margin-top: 0.5rem; padding-left: 1.25rem;">
              <li>Booking appointments</li>
              <li>Checking symptoms</li>
              <li>Finding departments</li>
              <li>General health queries</li>
            </ul>
            How can I assist you today?
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-action" onclick="sendQuickMessage('I want to book an appointment')">Book Appointment</button>
        <button class="quick-action" onclick="sendQuickMessage('I have a headache and fever')">Check Symptoms</button>
        <button class="quick-action" onclick="sendQuickMessage('What departments are available?')">View Departments</button>
        <button class="quick-action" onclick="sendQuickMessage('What are your visiting hours?')">Visiting Hours</button>
        <button class="quick-action" onclick="sendQuickMessage('I need mental health support')">Mental Health</button>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-container">
        <input 
          type="text" 
          class="chat-input" 
          id="chatInput" 
          placeholder="Type your message..."
          onkeypress="handleKeyPress(event)"
        >
        <button class="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
